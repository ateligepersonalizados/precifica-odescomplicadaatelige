<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATELIGÊ - PRECIFICAÇÃO 2.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #8e44ad; --secondary: #9b59b6; --accent: #d8bfd8; --light: #f3e5f5; --dark: #4a148c; --success: #2a9d8f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f4f9; margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .menu-card { background: white; border: 2px solid var(--light); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-card:active { transform: scale(0.95); background: var(--light); }
        .menu-card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--light); border-radius: 10px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-pdf { background: #2c3e50; color: white; margin-top: 20px; }
        .resumo-tabela { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 10px; overflow: hidden; }
        .resumo-tabela td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .row-total { background: var(--light); font-weight: bold; color: var(--dark); font-size: 1.1rem !important; }
        .back-nav { display: flex; align-items: center; cursor: pointer; color: var(--primary); margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>ATELIGÊ PRECIFICAÇÃO</h1></header>

    <div id="screen-dashboard" class="screen active">
        <div class="menu-grid">
            <div class="menu-card" onclick="showScreen('setup')"><i class="fas fa-cog"></i><br><span>Ajustes</span></div>
            <div class="menu-card" onclick="showScreen('fixed')"><i class="fas fa-wallet"></i><br><span>Fixos</span></div>
            <div class="menu-card" onclick="showScreen('materials')"><i class="fas fa-box"></i><br><span>Materiais</span></div>
            <div class="menu-card" onclick="showScreen('create-product')"><i class="fas fa-plus-circle"></i><br><span>Novo Item</span></div>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <div class="back-nav" onclick="showScreen('dashboard')"><i class="fas fa-chevron-left"></i> Voltar</div>
        <h3>Configurações de Margens</h3>
        <div class="form-group"><label>Renda Mensal Desejada (R$)</label><input type="number" id="set-income" value="2000"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group"><label>Horas/Dia</label><input type="number" id="set-hours" value="8"></div>
            <div class="form-group"><label>Dias/Semana</label><input type="number" id="set-days" value="5"></div>
        </div>
        <hr>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group"><label>Lucro (%)</label><input type="number" id="m-profit" value="30"></div>
            <div class="form-group"><label>Taxa Cartão (%)</label><input type="number" id="m-tax" value="9"></div>
            <div class="form-group"><label>Impostos (%)</label><input type="number" id="m-imp" value="4"></div>
            <div class="form-group"><label>Segurança (%)</label><input type="number" id="m-safe" value="15"></div>
            <div class="form-group"><label>Perdas (%)</label><input type="number" id="m-loss" value="5"></div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">SALVAR AJUSTES</button>
    </div>

    <div id="screen-create-product" class="screen">
        <div class="back-nav" onclick="showScreen('dashboard')">Voltar</div>
        <h3>Precificar Produto</h3>
        <div class="form-group"><label>Nome do Produto</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>Tempo de Produção (minutos)</label><input type="number" id="p-time"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group"><label>Embalagem (R$)</label><input type="number" id="p-emb" value="0"></div>
            <div class="form-group"><label>Outros/Frete (R$)</label><input type="number" id="p-frete" value="0"></div>
        </div>
        <hr>
        <label>Adicionar Materiais Cadastrados:</label>
        <select id="p-mat-sel"></select>
        <input type="number" id="p-mat-qty" placeholder="Quantidade usada" style="margin-top:5px">
        <button class="btn btn-outline" onclick="addMatToProd()">+ Incluir Material</button>
        <div id="p-mat-list" style="margin-top:10px; font-size: 0.8rem; color: #666;"></div>
        <button class="btn btn-primary" style="margin-top:20px" onclick="calculate()">GERAR RESUMO COMPLETO</button>
    </div>

    <div id="screen-result" class="screen">
        <div class="back-nav" onclick="showScreen('dashboard')">Início</div>
        <div id="pdf-area" style="padding: 10px;">
            <div id="resumo-final-box" style="border: 2px solid var(--primary); padding: 15px; border-radius: 15px; background: white;">
                <h3 id="res-at-name" style="text-align:center; color: var(--primary); margin:0;"></h3>
                <h4 id="res-prod-name" style="text-align:center; margin-bottom:15px; border-bottom: 1px solid #eee;"></h4>
                <table class="resumo-tabela" id="resumo-corpo"></table>
            </div>
        </div>
        <button class="btn btn-pdf" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> BAIXAR PDF COMPLETO</button>
    </div>

    <div id="screen-fixed" class="screen">
        <div class="back-nav" onclick="showScreen('dashboard')">Voltar</div>
        <input type="text" id="f-name" placeholder="Descrição"><input type="number" id="f-val" placeholder="Valor R$">
        <button class="btn btn-primary" onclick="addFixed()">Salvar Custo Fixo</button>
        <div id="f-list" style="margin-top:15px"></div>
    </div>
    <div id="screen-materials" class="screen">
        <div class="back-nav" onclick="showScreen('dashboard')">Voltar</div>
        <input type="text" id="m-name" placeholder="Nome Material"><input type="number" id="m-val" placeholder="Preço Unid">
        <button class="btn btn-primary" onclick="addMat()">Salvar no Estoque</button>
        <div id="m-list" style="margin-top:15px"></div>
    </div>
</div>

<script>
    let db = {
        set: JSON.parse(localStorage.getItem('at_set_v2')) || { income: 2000, hours: 8, days: 5, profit: 30, tax: 9, imp: 4, safe: 15, loss: 5 },
        mats: JSON.parse(localStorage.getItem('at_mats_v2')) || [],
        fixed: JSON.parse(localStorage.getItem('at_fix_v2')) || []
    };
    let curProdMats = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        if(id === 'setup') {
            document.getElementById('set-income').value = db.set.income;
            document.getElementById('set-hours').value = db.set.hours;
            document.getElementById('m-profit').value = db.set.profit;
            document.getElementById('m-tax').value = db.set.tax;
            document.getElementById('m-imp').value = db.set.imp;
            document.getElementById('m-safe').value = db.set.safe;
            document.getElementById('m-loss').value = db.set.loss;
        }
        if(id === 'create-product') {
            const sel = document.getElementById('p-mat-sel');
            sel.innerHTML = db.mats.map((m, i) => `<option value="${i}">${m.n} (R$ ${m.v})</option>`).join('');
            curProdMats = [];
            document.getElementById('p-mat-list').innerHTML = '';
        }
        if(id === 'fixed') renderF();
        if(id === 'materials') renderM();
    }

    function saveSettings() {
        db.set = {
            income: parseFloat(document.getElementById('set-income').value),
            hours: parseFloat(document.getElementById('set-hours').value),
            days: parseFloat(document.getElementById('set-days').value),
            profit: parseFloat(document.getElementById('m-profit').value),
            tax: parseFloat(document.getElementById('m-tax').value),
            imp: parseFloat(document.getElementById('m-imp').value),
            safe: parseFloat(document.getElementById('m-safe').value),
            loss: parseFloat(document.getElementById('m-loss').value)
        };
        localStorage.setItem('at_set_v2', JSON.stringify(db.set));
        alert('Configurações Salvas!');
    }

    function addFixed() {
        db.fixed.push({n: document.getElementById('f-name').value, v: parseFloat(document.getElementById('f-val').value)});
        localStorage.setItem('at_fix_v2', JSON.stringify(db.fixed));
        renderF();
    }
    function renderF() { document.getElementById('f-list').innerHTML = db.fixed.map(i => `<div>${i.n}: R$ ${i.v}</div>`).join(''); }

    function addMat() {
        db.mats.push({n: document.getElementById('m-name').value, v: parseFloat(document.getElementById('m-val').value)});
        localStorage.setItem('at_mats_v2', JSON.stringify(db.mats));
        renderM();
    }
    function renderM() { document.getElementById('m-list').innerHTML = db.mats.map(i => `<div>${i.n}: R$ ${i.v}</div>`).join(''); }

    function addMatToProd() {
        const idx = document.getElementById('p-mat-sel').value;
        const qty = parseFloat(document.getElementById('p-mat-qty').value);
        if(idx !== "" && qty > 0) {
            const m = db.mats[idx];
            curProdMats.push({n: m.n, sub: m.v * qty});
            document.getElementById('p-mat-list').innerHTML += `<div>• ${m.n}: R$ ${(m.v * qty).toFixed(2)}</div>`;
        }
    }

    function calculate() {
        const time = parseFloat(document.getElementById('p-time').value) || 0;
        const emb = parseFloat(document.getElementById('p-emb').value) || 0;
        const frete = parseFloat(document.getElementById('p-frete').value) || 0;
        
        const totalMinMonth = db.set.hours * db.set.days * 4 * 60;
        const labor = (time / totalMinMonth) * db.set.income;
        const matSum = curProdMats.reduce((s, i) => s + i.sub, 0);
        const fixTotal = db.fixed.reduce((s, i) => s + i.v, 0);
        const fixProd = (time / totalMinMonth) * fixTotal;

        const base = labor + matSum + fixProd + emb + frete;
        const vProfit = base * (db.set.profit / 100);
        const vTax = base * (db.set.tax / 100);
        const vImp = base * (db.set.imp / 100);
        const vSafe = base * (db.set.safe / 100);
        const vLoss = base * (db.set.loss / 100);
        const final = base + vProfit + vTax + vImp + vSafe + vLoss;

        document.getElementById('res-prod-name').innerText = document
