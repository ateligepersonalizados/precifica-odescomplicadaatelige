<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> PRECIFICAÇÃO DESCOMPLICADA </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #8e44ad; --secondary: #9b59b6; --accent: #d8bfd8; --light: #f3e5f5; --dark: #4a148c; --success: #27ae60; --danger: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f4f9; margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 50px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .menu-card { background: white; border: 2px solid var(--light); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border-bottom: 4px solid var(--accent); transition: 0.2s; }
        .menu-card:active { transform: scale(0.95); }
        .menu-card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 8px; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .back-link { color: var(--primary); cursor: pointer; font-weight: bold; display: block; margin-bottom: 15px; }
        .list-box { background: #fafafa; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        
        /* PDF FORMATO A4 */
        #pdf-area { width: 190mm; padding: 10mm; background: white; position: absolute; left: -9999px; color: #333; }
        .pdf-header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-table { width: 100%; border-collapse: collapse; }
        .pdf-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11pt; }
        .row-total { background: #f9f4ff; font-weight: bold; }
        .price-box { text-align: center; padding: 25px; border: 2px solid var(--primary); border-radius: 15px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>ATELIGÊ PRECIFICAÇÃO</h1></header>

    <div id="screen-dashboard" class="screen active">
        <div class="menu-grid">
            <div id="card-setup" class="menu-card" onclick="openScreen('setup')"><i class="fas fa-cog"></i><br>Engrenagem</div>
            <div id="card-mats" class="menu-card" onclick="openScreen('materials')"><i class="fas fa-boxes"></i><br>Insumos</div>
            <div id="card-saved" class="menu-card" onclick="openScreen('saved')"><i class="fas fa-list-ul"></i><br>Itens Salvos</div>
            <div id="card-prod" class="menu-card" onclick="openScreen('product')"><i class="fas fa-calculator"></i><br>Precificar</div>
        </div>
        <p style="text-align: center; font-size: 0.7rem; color: #999; margin-top: 30px;">Versão 5.0 - AteliGê</p>
    </div>

    <div id="screen-setup" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Dados da Empresa</h3>
        <input type="text" id="comp-name" placeholder="Nome do Ateliê">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="comp-wa" placeholder="WhatsApp">
            <input type="text" id="comp-ig" placeholder="Instagram">
        </div>
        <input type="text" id="comp-footer" placeholder="Validade (ex: 7 dias)">
        <hr>
        <h3>Cálculo de Mão de Obra</h3>
        <div class="form-group">
            <label>Pró-labore Mensal (R$)</label>
            <input type="number" id="s-income" value="2000">
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group"><label>Horas/Dia</label><input type="number" id="s-hours" value="8"></div>
            <div class="form-group"><label>Dias/Semana</label><input type="number" id="s-days" value="5"></div>
        </div>
        <div class="form-group">
            <label>Custos Fixos Totais (R$)</label>
            <input type="number" id="f-total" value="1190.67">
        </div>
        <hr>
        <h3>Margens (%)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div><label>Lucro %</label><input type="number" id="p-profit" value="30"></div>
            <div><label>Taxas %</label><input type="number" id="p-tax" value="9"></div>
            <div><label>Imposto %</label><input type="number" id="p-imp" value="4"></div>
            <div><label>Segurança %</label><input type="number" id="p-safe" value="15"></div>
            <div><label>Perdas %</label><input type="number" id="p-loss" value="5"></div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">SALVAR CONFIGURAÇÕES</button>
    </div>

    <div id="screen-materials" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Cadastrar Insumo</h3>
        <input type="text" id="m-name" placeholder="Nome do Material">
        <input type="number" step="0.0001" id="m-val" placeholder="Custo Unitário (R$)">
        <button class="btn btn-primary" onclick="addMaterial()">CADASTRAR</button>
        <hr>
        <div id="m-list-display"></div>
    </div>

    <div id="screen-saved" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Histórico de Produtos</h3>
        <div id="saved-list-display"></div>
    </div>

    <div id="screen-product" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Novo Orçamento</h3>
        <input type="text" id="p-name" placeholder="Nome do Produto">
        <input type="number" id="p-time" placeholder="Tempo de Produção (Minutos)">
        <input type="number" id="p-emb" placeholder="Custo Embalagem/Unboxing (R$)" value="0">
        <hr>
        <label>Selecione os Insumos:</label>
        <select id="sel-mats"></select>
        <input type="number" id="sel-qty" placeholder="Quantidade usada">
        <button class="btn" style="background:var(--secondary); color:white" onclick="pushMat()">+ Adicionar ao Cálculo</button>
        <div id="mats-temp" style="margin-top: 10px; font-size: 0.85rem; color: #666;"></div>
        <button class="btn btn-primary" style="background: var(--success);" onclick="calculate()">FINALIZAR E GERAR PDF</button>
    </div>

    <div id="screen-result" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Início</span>
        <div style="background: var(--light); padding: 30px; border-radius: 20px; text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success); margin-bottom: 15px;"></i>
            <h3>Cálculo Concluído!</h3>
            <button class="btn btn-primary" onclick="savePDF()"><i class="fas fa-file-pdf"></i> BAIXAR PDF COMPLETO</button>
        </div>
    </div>
</div>

<div id="pdf-area">
    <div class="pdf-header">
        <h1 id="pdf-h-name" style="margin:0; color:var(--primary);"></h1>
        <p id="pdf-h-contact" style="margin:5px 0; font-size: 10pt; color: #666;"></p>
    </div>
    <h2 id="pdf-p-title" style="text-align: center; text-transform: uppercase;"></h2>
    <table class="pdf-table"><tbody id="pdf-table-body"></tbody></table>
    <div class="price-box">
        <div style="font-size: 11pt; color: #555; margin-bottom: 10px;">PREÇO SUGERIDO DE VENDA</div>
        <div id="pdf-price-val" style="font-size: 30pt; font-weight: bold; color: var(--primary);"></div>
    </div>
    <p id="pdf-footer-note" style="text-align: center; font-size: 9pt; color: #777; margin-top: 40px; border-top: 1px solid #eee; padding-top: 10px;"></p>
</div>

<script>
    // Carregamento de dados com proteção contra erro de computador novo
    let db = {
        set: JSON.parse(localStorage.getItem('at_v8_set')) || { name: 'AteliGê', wa: '', ig: '', footer: 'Orçamento válido por 7 dias', income: 2000, hours: 8, days: 5, fixedTotal: 1190.67, profit: 30, tax: 9, imp: 4, safe: 15, loss: 5 },
        mats: JSON.parse(localStorage.getItem('at_v8_mats')) || [],
        saved: JSON.parse(localStorage.getItem('at_v8_saved')) || []
    };
    let curMats = [];

    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        
        if(id === 'setup') {
            document.getElementById('comp-name').value = db.set.name;
            document.getElementById('comp-wa').value = db.set.wa;
            document.getElementById('comp-ig').value = db.set.ig;
            document.getElementById('comp-footer').value = db.set.footer;
            document.getElementById('s-income').value = db.set.income;
            document.getElementById('s-hours').value = db.set.hours;
            document.getElementById('s-days').value = db.set.days;
            document.getElementById('f-total').value = db.set.fixedTotal;
            document.getElementById('p-profit').value = db.set.profit;
            document.getElementById('p-tax').value = db.set.tax;
            document.getElementById('p-imp').value = db.set.imp;
            document.getElementById('p-safe').value = db.set.safe;
            document.getElementById('p-loss').value = db.set.loss;
        }
        if(id === 'materials') renderM();
        if(id === 'saved') renderS();
        if(id === 'product') {
            const select = document.getElementById('sel-mats');
            select.innerHTML = '<option value="">Escolha um insumo...</option>' + 
                db.mats.map((m,i)=>`<option value="${i}">${m.n}</option>`).join('');
            curMats = []; 
            document.getElementById('mats-temp').innerHTML = '';
        }
    }

    function saveSettings() {
        db.set = {
            name: document.getElementById('comp-name').value,
            wa: document.getElementById('comp-wa').value,
            ig: document.getElementById('comp-ig').value,
            footer: document.getElementById('comp-footer').value,
            income: parseFloat(document.getElementById('s-income').value),
            hours: parseFloat(document.getElementById('s-hours').value),
            days: parseFloat(document.getElementById('s-days').value),
            fixedTotal: parseFloat(document.getElementById('f-total').value),
            profit: parseFloat(document.getElementById('p-profit').value),
            tax: parseFloat(document.getElementById('p-tax').value),
            imp: parseFloat(document.getElementById('p-imp').value),
            safe: parseFloat(document.getElementById('p-safe').value),
            loss: parseFloat(document.getElementById('p-loss').value)
        };
        localStorage.setItem('at_v8_set', JSON.stringify(db.set));
        alert("Configurações atualizadas!");
    }

    function addMaterial() {
        const n = document.getElementById('m-name').value;
        const v = parseFloat(document.getElementById('m-val').value);
        if(n && v) {
            db.mats.push({n, v});
            localStorage.setItem('at_v8_mats', JSON.stringify(db.mats));
            document.getElementById('m-name').value = ''; 
            document.getElementById('m-val').value = '';
            renderM();
        }
    }

    function renderM() {
        const div = document.getElementById('m-list-display');
        div.innerHTML = db.mats.length ? db.mats.map(m => `<div class="list-box">${m.n} <b>R$ ${m.v.toFixed(4)}</b></div>`).join('') : '<p>Nenhum insumo cadastrado.</p>';
    }

    function renderS() {
        const div = document.getElementById('saved-list-display');
        div.innerHTML = db.saved.length ? db.saved.map(s => `<div class="list-box"><span>${s.name}</span> <b style="color:var(--primary)">R$ ${s.price}</b></div>`).join('') : '<p>Nenhum produto salvo ainda.</p>';
    }

    function pushMat() {
        const i = document.getElementById('sel-mats').value;
        const q = parseFloat(document.getElementById('sel-qty').value);
        if(i !== "" && q > 0) {
            const m = db.mats[i];
            curMats.push({ n: m.n, v: m.v * q });
            document.getElementById('mats-temp').innerHTML += `<div>• ${m.n} (R$ ${(m.v*q).toFixed(2)})</div>`;
            document.getElementById('sel-qty').value = '';
        }
    }

    function calculate() {
        const time = parseFloat(document.getElementById('p-time').value) || 0;
        const emb = parseFloat(document.getElementById('p-emb').value) || 0;
        
        // Lógica de tempo (Igual à planilha)
        const totalHorasMes = db.set.hours * db.set.days * 4;
        const totalMinMes = totalHorasMes * 60;
        
        const labor = (time / totalMinMes) * db.set.income;
        const fixProp = (time / totalMinMes) * db.set.fixedTotal;
        const matSum = curMats.reduce((s,i)=>s+i.v, 0);
        
        const custoProducao = labor + fixProp + matSum + emb;
        
        // Preço de venda (Custo / (1 - Margens))
        const margensTotal = (db.set.profit + db.set.tax + db.set.imp + db.set.safe + db.set.loss) / 100;
        const precoVenda = custoProducao / (1 - margensTotal);

        // Salvar Histórico
        db.saved.push({ name: document.getElementById('p-name').value, price: precoVenda.toFixed(2) });
        localStorage.setItem('at_v8_saved', JSON.stringify(db.saved));

        // Preparar PDF
        document.getElementById('pdf-h-name').innerText = db.set.name;
        document.getElementById('pdf-h-contact').innerText = `WhatsApp: ${db.set.wa} | Instagram: ${db.set.ig}`;
        document.getElementById('pdf-p-title').innerText = document.getElementById('p-name').value;
        document.getElementById('pdf-price-val').innerText = "R$ " + precoVenda.toFixed(2);
        document.getElementById('pdf-footer-note').innerText = db.set.footer;

        document.
