<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> PRECIFICAÇÃO DESCOMPLICADA 1.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #8e44ad; --secondary: #9b59b6; --accent: #d8bfd8; --light: #f3e5f5; --dark: #4a148c; --success: #2a9d8f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f4f9; margin: 0; padding: 0; color: var(--dark); line-height: 1.4; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 50px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-size: 0.9rem; border-bottom: 4px solid var(--secondary); }
        .screen { display: none; padding: 15px; }
        .active { display: block; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .menu-card { background: white; border: 2px solid var(--light); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; }
        .menu-card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 0.8rem; color: var(--primary); }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; font-size: 0.95rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .resumo-tabela { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .resumo-tabela td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .final-price-box { background: var(--light); padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; border: 2px solid var(--primary); }
        .back-link { color: var(--primary); cursor: pointer; font-weight: bold; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>PRECIFICAÇÃO ATELIGÊ 1.0</h1></header>

    <div id="screen-dashboard" class="screen active">
        <div class="menu-grid">
            <div class="menu-card" onclick="openScreen('setup')"><i class="fas fa-cog"></i><br>Ajustes</div>
            <div class="menu-card" onclick="openScreen('materials')"><i class="fas fa-cut"></i><br>Materiais</div>
            <div class="menu-card" onclick="openScreen('fixed')"><i class="fas fa-wallet"></i><br>Fixos</div>
            <div class="menu-card" onclick="openScreen('product')"><i class="fas fa-plus-circle"></i><br>Novo Item</div>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Parâmetros da Planilha</h3>
        <div class="form-group"><label>Salário Desejado (R$)</label><input type="number" id="s-income" value="2000"></div>
        <div style="display: flex; gap: 8px;">
            <div class="form-group"><label>Horas/Dia</label><input type="number" id="s-hours" value="8"></div>
            <div class="form-group"><label>Dias/Semana</label><input type="number" id="s-days" value="5"></div>
        </div>
        <hr>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div class="form-group"><label>Lucro %</label><input type="number" id="p-profit" value="30"></div>
            <div class="form-group"><label>Taxa Cartão %</label><input type="number" id="p-tax" value="9"></div>
            <div class="form-group"><label>Impostos %</label><input type="number" id="p-imp" value="4"></div>
            <div class="form-group"><label>Segurança %</label><input type="number" id="p-safe" value="15"></div>
            <div class="form-group"><label>Perdas %</label><input type="number" id="p-loss" value="5"></div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">SALVAR CONFIGURAÇÕES</button>
    </div>

    <div id="screen-materials" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Cadastro de Insumos</h3>
        <div class="form-group"><label>Nome do Insumo</label><input type="text" id="m-name" placeholder="Ex: Papelão cinza A5"></div>
        <div class="form-group"><label>Preço Unitário (R$)</label><input type="number" step="0.0001" id="m-val"></div>
        <button class="btn btn-primary" onclick="addMaterial()">CADASTRAR</button>
        <div id="m-list" style="margin-top:15px; font-size: 0.8rem;"></div>
    </div>

    <div id="screen-fixed" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Custos Fixos Mensais</h3>
        <input type="text" id="f-name" placeholder="Ex: Internet">
        <input type="number" id="f-val" placeholder="Valor R$">
        <button class="btn btn-primary" onclick="addFixed()">ADICIONAR</button>
        <div id="f-list" style="margin-top:15px; font-size: 0.8rem;"></div>
    </div>

    <div id="screen-product" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Precificar Produto</h3>
        <div class="form-group"><label>Nome do Produto</label><input type="text" id="prod-name"></div>
        <div class="form-group"><label>Tempo Produção (Minutos)</label><input type="number" id="prod-time"></div>
        <div style="display: flex; gap: 8px;">
            <div class="form-group"><label>Embalagem R$</label><input type="number" id="prod-emb" value="0"></div>
            <div class="form-group"><label>Frete/Outros R$</label><input type="number" id="prod-frete" value="0"></div>
        </div>
        <hr>
        <label>Insumos:</label>
        <select id="sel-mats"></select>
        <input type="number" id="sel-qty" placeholder="Qtd usada" style="margin-top:5px">
        <button class="btn btn-outline" onclick="pushMat()">+ Adicionar Insumo</button>
        <div id="prod-mats-display" style="margin-top:10px; font-size: 0.8rem; background: #fafafa; padding: 5px;"></div>
        <button class="btn btn-primary" style="margin-top:15px; background: #27ae60;" onclick="calculate()">GERAR PDF COMPLETO</button>
    </div>

    <div id="screen-result" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Início</span>
        <div id="export-pdf" style="padding: 10px; background: white;">
            <div style="text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">
                <h2 id="res-at-name" style="margin:0; color:var(--primary)"></h2>
                <small>RELATÓRIO DE PRECIFICAÇÃO</small>
            </div>
            <h3 id="res-prod-name" style="margin: 10px 0 5px 0;"></h3>
            <table class="resumo-tabela" id="resumo-dados"></table>
            <div class="final-price-box">
                <small>PREÇO DE VENDA SUGERIDO</small>
                <div id="res-final-price" style="font-size: 1.8rem; font-weight: bold; color: var(--primary);"></div>
            </div>
        </div>
        <button class="btn btn-primary" style="background:#2c3e50" onclick="savePDF()"><i class="fas fa-file-pdf"></i> BAIXAR ORÇAMENTO</button>
    </div>

</div>

<script>
    let db = {
        set: JSON.parse(localStorage.getItem('at_set_v3')) || { income: 2000, hours: 8, days: 5, profit: 30, tax: 9, imp: 4, safe: 15, loss: 5, name: 'AteliGê' },
        mats: JSON.parse(localStorage.getItem('at_mats_v3')) || [],
        fixed: JSON.parse(localStorage.getItem('at_fix_v3')) || []
    };
    let curMats = [];

    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        if(id === 'setup') {
            document.getElementById('s-income').value = db.set.income;
            document.getElementById('p-profit').value = db.set.profit;
            document.getElementById('p-tax').value = db.set.tax;
            document.getElementById('p-imp').value = db.set.imp;
            document.getElementById('p-safe').value = db.set.safe;
            document.getElementById('p-loss').value = db.set.loss;
        }
        if(id === 'product') {
            const s = document.getElementById('sel-mats');
            s.innerHTML = '<option value="">Selecione...</option>' + db.mats.map((m,i) => `<option value="${i}">${m.n}</option>`).join('');
            curMats = [];
            document.getElementById('prod-mats-display').innerHTML = '';
        }
        if(id === 'materials') renderM();
        if(id === 'fixed') renderF();
    }

    function saveSettings() {
        db.set.income = parseFloat(document.getElementById('s-income').value);
        db.set.hours = parseFloat(document.getElementById('s-hours').value);
        db.set.profit = parseFloat(document.getElementById('p-profit').value);
        db.set.tax = parseFloat(document.getElementById('p-tax').value);
        db.set.imp = parseFloat(document.getElementById('p-imp').value);
        db.set.safe = parseFloat(document.getElementById('p-safe').value);
        db.set.loss = parseFloat(document.getElementById('p-loss').value);
        localStorage.setItem('at_set_v3', JSON.stringify(db.set));
        alert("Configurações salvas!");
    }

    function addMaterial() {
        db.mats.push({n: document.getElementById('m-name').value, v: parseFloat(document.getElementById('m-val').value)});
        localStorage.setItem('at_mats_v3', JSON.stringify(db.mats));
        renderM();
    }
    function renderM() { document.getElementById('m-list').innerHTML = db.mats.map(m => `<div>${m.n}: R$ ${m.v.toFixed(4)}</div>`).join(''); }

    function addFixed() {
        db.fixed.push({n: document.getElementById('f-name').value, v: parseFloat(document.getElementById('f-val').value)});
        localStorage.setItem('at_fix_v3', JSON.stringify(db.fixed));
        renderF();
    }
    function renderF() { document.getElementById('f-list').innerHTML = db.fixed.map(f => `<div>${f.n}: R$ ${f.v.toFixed(2)}</div>`).join(''); }

    function pushMat() {
        const i = document.getElementById('sel-mats').value;
        const q = parseFloat(document.getElementById('sel-qty').value);
        if(i !== "" && q > 0) {
            const m = db.mats[i];
            curMats.push({n: m.n, sub: m.v * q});
            document.getElementById('prod-mats-display').innerHTML += `<div>• ${m.n} (R$ ${(m.v*q).toFixed(2)})</div>`;
        }
    }

    function calculate() {
        const time = parseFloat(document.getElementById('prod-time').value) || 0;
        const emb = parseFloat(document.getElementById('prod-emb').value) || 0;
        const frete = parseFloat(document.getElementById('prod-frete').value) || 0;

        const totalMin = db.set.hours * db.set.days * 4 * 60;
        const labor = (time / totalMin) * db.set.income;
        const matSum = curMats.reduce((s, i) => s + i.sub, 0);
        const fixSum = (time / totalMin) * db.fixed.reduce((s, i) => s + i.v, 0);

        const base = labor + matSum + fixSum + emb + frete;
        const vProfit = base * (db.set.profit / 100);
        const vTax = base * (db.set.tax / 100);
        const vImp = base * (db.set.imp / 100);
        const vSafe = base * (db.set.safe / 100);
        const vLoss = base * (db.set.loss / 100);
        const final = base + vProfit + vTax + vImp + vSafe + vLoss;

        document.getElementById('res-at-name').innerText = db.set.name;
        document.getElementById('res-prod-name').innerText = document.getElementById('prod-name').value || "Produto";
        document.getElementById('res-final-price').innerText = "R$ " + final.toFixed(2);
        
        document.getElementById('resumo-dados').innerHTML = `
            <tr><td>Mão de Obra</td><td align="right">R$ ${labor.toFixed(2)}</td></tr>
            <tr><td>Insumos/Materiais</td><td align="right">R$ ${matSum.toFixed(2)}</td></tr>
            <tr><td>Custo Fixo Prop.</td><td align="right">R$ ${fixSum.toFixed(2)}</td></tr>
            <tr><td>Embalagem</td><td align="right">R$ ${emb.toFixed(2)}</td></tr>
            <tr><td>Envio/Frete</td><td align="right">R$ ${frete.toFixed(2)}</td></tr>
            <tr><td>Segurança (${db.set.safe}%)</td><td align="right">R$ ${vSafe.toFixed(2)}</td></tr>
            <tr><td>Impostos/Taxas</td><td align="right">R$ ${(vTax + vImp).toFixed(2)}</td></tr>
            <tr style="color:var(--success); font-weight:bold;"><td>LUCRO PREVISTO</td><td align="right">R$ ${vProfit.toFixed(2)}</td></tr>
        `;
        openScreen('result');
    }

    function savePDF() {
        const el = document.getElementById('export-pdf');
        html2pdf().from(el).set({ margin: 10, filename: 'Orcamento_Atelige.pdf', html2canvas: { scale: 3 } }).save();
    }
</script>
</body>
</html>
