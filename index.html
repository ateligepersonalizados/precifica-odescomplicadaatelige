<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AteliGê - Gestão e Precificação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --ouro: #d4af37; --vinho: #8a6d3b; --fundo: #fdfaf6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--fundo); color: #444; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--ouro); }
        h1 { text-align: center; color: var(--vinho); text-transform: uppercase; letter-spacing: 2px; }
        .input-box { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--vinho); }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--ouro); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--vinho); }
        .resultado-area { margin-top: 25px; display: none; }
        .card { padding: 15px; margin-bottom: 10px; border-radius: 8px; color: white; display: flex; justify-content: space-between; font-weight: bold; }
        .ideal { background: #27ae60; }
        .shopee { background: #e67e22; }
        .tiktok { background: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AteliGê</h1>
        <div class="input-box">
            <label>Nome do Produto</label>
            <input type="text" id="prod_nome" placeholder="Ex: Convite Thalita 15 anos">
        </div>
        <div class="input-box">
            <label>Total de Insumos (R$)</label>
            <input type="number" id="prod_insumos" step="0.01">
        </div>
        <div class="input-box">
            <label>Tempo de Produção (Minutos)</label>
            <input type="number" id="prod_tempo">
        </div>
        <button onclick="gerarCalculo()">Calcular Agora</button>

        <div id="resultado" class="resultado-area">
            <div class="card ideal"><span>Preço Ideal (Loja)</span><span id="res_ideal"></span></div>
            <div class="card shopee"><span>Preço Shopee (20%)</span><span id="res_shopee"></span></div>
            <div class="card tiktok"><span>Preço TikTok (13%)</span><span id="res_tiktok"></span></div>
            <button onclick="baixarPDF()" style="background: #7f8c8d;">⬇️ Baixar Relatório Detalhado (PDF)</button>
        </div>
    </div>

    <script>
        let ultimoCalculo = {};

        function gerarCalculo() {
            const nome = document.getElementById('prod_nome').value;
            const insumos = parseFloat(document.getElementById('prod_insumos').value) || 0;
            const tempo = parseFloat(document.getElementById('prod_tempo').value) || 0;

            // Suas taxas reais de ontem
            const pro_labore = 2500;
            const horas_mes = 160;
            const valor_minuto = (pro_labore / horas_mes) / 60;
            const mao_obra = tempo * valor_minuto;
            const fixas = 3.72; // Valor que calculamos da sua planilha
            
            const custo_total = insumos + mao_obra + fixas;
            const preco_venda = custo_total / (1 - 0.14 - 0.30); // 14% impostos/taxas + 30% lucro

            ultimoCalculo = { nome, insumos, mao_obra, fixas, preco_venda };

            document.getElementById('res_ideal').innerText = "R$ " + preco_venda.toFixed(2);
            document.getElementById('res_shopee').innerText = "R$ " + (preco_venda / 0.8).toFixed(2);
            document.getElementById('res_tiktok').innerText = "R$ " + (preco_venda / 0.87).toFixed(2);
            document.getElementById('resultado').style.display = 'block';
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Relatório de Custos - AteliGê", 20, 20);
            doc.text("Produto: " + ultimoCalculo.nome, 20, 30);
            doc.autoTable({
                startY: 40,
                head: [['Descrição', 'Valor']],
                body: [
                    ['Insumos', 'R$ ' + ultimoCalculo.insumos.toFixed(2)],
                    ['Mão de Obra', 'R$ ' + ultimoCalculo.mao_obra.toFixed(2)],
                    ['Custos Fixos', 'R$ ' + ultimoCalculo.fixas.toFixed(2)],
                    ['PREÇO FINAL', 'R$ ' + ultimoCalculo.preco_venda.toFixed(2)]
                ]
            });
            doc.save("AteliGe_" + ultimoCalculo.nome + ".pdf");
        }
    </script>
</body>
</html>
