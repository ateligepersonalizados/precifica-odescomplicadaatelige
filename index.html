<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> PRECIFICAÇÃO DESCOMPLICADA </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #8e44ad; --secondary: #9b59b6; --accent: #d8bfd8; --light: #f3e5f5; --dark: #4a148c; --success: #27ae60; --danger: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f4f9; margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 50px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .menu-card { background: white; border: 2px solid var(--light); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border-bottom: 4px solid var(--accent); }
        .menu-card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 8px; margin-bottom: 10px; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .back-link { color: var(--primary); cursor: pointer; font-weight: bold; display: block; margin-bottom: 15px; }
        .item-list { background: #fafafa; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        /* ÁREA DO PDF (A4) */
        #pdf-area { width: 185mm; padding: 12mm; background: white; position: absolute; left: -9999px; color: #333; }
        .pdf-header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .pdf-table td { padding: 8px; border-bottom: 1px solid #eee; font-size: 11pt; }
        .row-total { background: #f9f4ff; font-weight: bold; }
        .price-final-box { text-align: center; padding: 20px; border: 2px solid var(--primary); border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>ATELIGÊ PRECIFICAÇÃO</h1></header>

    <div id="screen-dashboard" class="screen active">
        <div class="menu-grid">
            <div class="menu-card" onclick="openScreen('setup')"><i class="fas fa-id-card"></i><br>Minha Empresa</div>
            <div class="menu-card" onclick="openScreen('materials')"><i class="fas fa-boxes"></i><br>Meus Insumos</div>
            <div class="menu-card" onclick="openScreen('saved')"><i class="fas fa-list-ul"></i><br>Itens Salvos</div>
            <div class="menu-card" onclick="openScreen('product')"><i class="fas fa-calculator"></i><br>Novo Cálculo</div>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <input type="text" id="comp-name" placeholder="Nome do Ateliê">
        <input type="text" id="comp-wa" placeholder="WhatsApp">
        <input type="text" id="comp-ig" placeholder="Instagram">
        <input type="text" id="comp-footer" placeholder="Validade/Frase do Rodapé">
        <hr>
        <label>Lucro Desejado %</label><input type="number" id="p-profit" value="30">
        <label>Impostos + Taxas %</label><input type="number" id="p-fees" value="13">
        <label>Segurança + Perdas %</label><input type="number" id="p-safe" value="20">
        <button class="btn btn-primary" onclick="saveSettings()">SALVAR CONFIGURAÇÕES</button>
    </div>

    <div id="screen-saved" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <h3>Produtos Precificados</h3>
        <div id="saved-list"></div>
    </div>

    <div id="screen-product" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Voltar</span>
        <input type="text" id="p-name" placeholder="Nome do Produto">
        <input type="number" id="p-time" placeholder="Tempo de Produção (Minutos)">
        <input type="number" id="p-emb" placeholder="Embalagem R$">
        <hr>
        <select id="sel-mats"></select>
        <input type="number" id="sel-qty" placeholder="Quantidade">
        <button class="btn" style="background:var(--secondary); color:white" onclick="pushMat()">+ Adicionar ao Cálculo</button>
        <div id="mats-temp" style="margin: 10px 0; font-size: 0.85rem;"></div>
        <button class="btn btn-primary" onclick="calculate()">CALCULAR E GERAR PDF</button>
    </div>

    <div id="screen-result" class="screen">
        <span class="back-link" onclick="openScreen('dashboard')">← Início</span>
        <div style="background: var(--light); padding: 20px; border-radius: 15px; text-align: center;">
            <h3>Cálculo Finalizado!</h3>
            <button class="btn btn-primary" onclick="savePDF()">BAIXAR PDF (A4)</button>
            <button class="btn" onclick="openScreen('product')" style="background:#bdc3c7">NOVO CÁLCULO</button>
        </div>
    </div>
</div>

<div id="pdf-area">
    <div class="pdf-header">
        <h1 id="pdf-h-name"></h1>
        <p id="pdf-h-contact"></p>
    </div>
    <h2 id="pdf-p-title"></h2>
    <table class="pdf-table"><tbody id="pdf-table-body"></tbody></table>
    <div class="price-final-box">
        <div style="font-size: 11pt; margin-bottom: 5px;">PREÇO SUGERIDO DE VENDA</div>
        <div id="pdf-price-val" style="font-size: 26pt; font-weight: bold; color: var(--primary);"></div>
    </div>
    <p id="pdf-footer-note" style="text-align: center; font-size: 9pt; color: #666; margin-top: 30px;"></p>
</div>

<script>
    let db = {
        set: JSON.parse(localStorage.getItem('at_v6_set')) || { name: 'AteliGê', wa: '', ig: '', footer: 'Orçamento válido por 7 dias', profit: 30, fees: 13, safe: 20 },
        mats: JSON.parse(localStorage.getItem('at_v6_mats')) || [],
        saved: JSON.parse(localStorage.getItem('at_v6_saved')) || []
    };
    let curMats = [];

    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        if(id === 'setup') {
            document.getElementById('comp-name').value = db.set.name;
            document.getElementById('comp-wa').value = db.set.wa;
            document.getElementById('comp-ig').value = db.set.ig;
            document.getElementById('comp-footer').value = db.set.footer;
        }
        if(id === 'product') {
            document.getElementById('sel-mats').innerHTML = '<option>Selecione um insumo...</option>' + db.mats.map((m,i)=>`<option value="${i}">${m.n}</option>`).join('');
            curMats = []; document.getElementById('mats-temp').innerHTML = '';
        }
        if(id === 'saved') renderSaved();
    }

    function saveSettings() {
        db.set = { 
            name: document.getElementById('comp-name').value, 
            wa: document.getElementById('comp-wa').value,
            ig: document.getElementById('comp-ig').value,
            footer: document.getElementById('comp-footer').value,
            profit: parseFloat(document.getElementById('p-profit').value),
            fees: parseFloat(document.getElementById('p-fees').value),
            safe: parseFloat(document.getElementById('p-safe').value)
        };
        localStorage.setItem('at_v6_set', JSON.stringify(db.set));
        alert("Configurações Salvas!");
    }

    function pushMat() {
        const i = document.getElementById('sel-mats').value;
        const q = document.getElementById('sel-qty').value;
        if(i !== "" && q > 0) {
            const m = db.mats[i];
            curMats.push({ n: m.n, v: m.v * q });
            document.getElementById('mats-temp').innerHTML += `<div>• ${m.n} (R$ ${(m.v*q).toFixed(2)})</div>`;
        }
    }

    function calculate() {
        const time = parseFloat(document.getElementById('p-time').value) || 0;
        const labor = (time / 9600) * 2000;
        const matSum = curMats.reduce((s,i)=>s+i.v, 0);
        const emb = parseFloat(document.getElementById('p-emb').value) || 0;
        
        const custoBase = labor + matSum + emb;
        const final = custoBase / (1 - ((db.set.profit + db.set.fees + db.set.safe)/100));

        // Salva na lista
        db.saved.push({ name: document.getElementById('p-name').value, price: final.toFixed(2) });
        localStorage.setItem('at_v6_saved', JSON.stringify(db.saved));

        // Preenche PDF
        document.getElementById('pdf-h-name').innerText = db.set.name;
        document.getElementById('pdf-h-contact').innerText = `WA: ${db.set.wa} | IG: ${db.set.ig}`;
        document.getElementById('pdf-p-title').innerText = document.getElementById('p-name').value.toUpperCase();
        document.getElementById('pdf-price-val').innerText = "R$ " + final.toFixed(2);
        document.getElementById('pdf-footer-note').innerText = db.set.footer;

        document.getElementById('pdf-table-body').innerHTML = `
            <tr><td>Mão de Obra</td><td align="right">R$ ${labor.toFixed(2)}</td></tr>
            <tr><td>Insumos</td><td align="right">R$ ${matSum.toFixed(2)}</td></tr>
            <tr><td>Embalagem</td><td align="right">R$ ${emb.toFixed(2)}</td></tr>
            <tr class="row-total"><td>CUSTO TOTAL DE PRODUÇÃO</td><td align="right">R$ ${custoBase.toFixed(2)}</td></tr>
            <tr><td>Margens e Impostos (${db.set.fees + db.set.safe}%)</td><td align="right">R$ ${(final * (db.set.fees + db.set.safe)/100).toFixed(2)}</td></tr>
            <tr style="color:green; font-weight:bold;"><td>LUCRO LÍQUIDO (${db.set.profit}%)</td><td align="right">R$ ${(final * db.set.profit/100).toFixed(2)}</td></tr>
        `;
        openScreen('result');
    }

    function renderSaved() {
        document.getElementById('saved-list').innerHTML = db.saved.map(item => `
            <div class="item-list">
                <span><b>${item.name}</b></span>
                <span style="color:var(--primary)">R$ ${item.price}</span>
            </div>
        `).join('');
    }

    function savePDF() {
        const el = document.getElementById('pdf-area');
        el.style.left = "0";
        html2pdf().from(el).set({ margin: 0, filename: 'Orcamento.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).save().then(()=> el.style.left = "-9999px");
    }
</script>
</body>
</html>
