<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AteliGê Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; margin: 0; }
        #app { width: 100%; max-width: 400px; background: white; min-height: 100vh; }
        header { background: #8e44ad; color: white; padding: 20px; text-align: center; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn-menu { background: #fdfaff; border: 2px solid #8e44ad; padding: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tela { display: none; padding: 20px; }
        .ativa { display: block; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-acao { background: #8e44ad; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>AteliGê</h1>
        <small>Sistema de Precificação</small>
    </header>

    <div id="home" class="tela ativa">
        <div class="menu">
            <button class="btn-menu" onclick="irPara('ajustes')">⚙️ Ajustes</button>
            <button class="btn-menu" onclick="irPara('insumos')">📦 Insumos</button>
            <button class="btn-menu" onclick="irPara('calc')">🧮 Calcular</button>
            <button class="btn-menu" onclick="resetGeral()" style="border-color: red; color: red;">⚠️ Reset</button>
        </div>
    </div>

    <div id="ajustes" class="tela">
        <button onclick="irPara('home')">← Voltar</button>
        <h3>Configurações</h3>
        <label>Pró-labore (R$)</label>
        <input type="number" id="set-renda" value="2000">
        <label>Custos Fixos (R$)</label>
        <input type="number" id="set-fixo" value="1190.67">
        <button class="btn-acao" onclick="salvarAjustes()">Salvar</button>
    </div>

    <div id="insumos" class="tela">
        <button onclick="irPara('home')">← Voltar</button>
        <h3>Cadastrar Insumo</h3>
        <input type="text" id="ins-nome" placeholder="Nome">
        <input type="number" id="ins-preco" placeholder="Preço Unitário">
        <button class="btn-acao" onclick="addInsumo()">Cadastrar</button>
        <div id="lista-insumos" style="margin-top: 20px;"></div>
    </div>

    <div id="calc" class="tela">
        <button onclick="irPara('home')">← Voltar</button>
        <h3>Novo Cálculo</h3>
        <input type="text" id="prod-nome" placeholder="Nome do Produto">
        <input type="number" id="prod-tempo" placeholder="Tempo (Minutos)">
        <button class="btn-acao" onclick="calcularTudo()">Calcular Preço Final</button>
        <h2 id="resultado" style="text-align: center; color: #8e44ad;"></h2>
    </div>
</div>

<script>
    // Limpeza profunda de qualquer versão travada anterior
    if (!localStorage.getItem('versao_limpa')) {
        localStorage.clear();
        localStorage.setItem('versao_limpa', '1.0');
    }

    let dados = JSON.parse(localStorage.getItem('atelige_data')) || { config: {renda: 2000, fixo: 1190.67}, materiais: [] };

    function irPara(id) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        if(id === 'insumos') listarInsumos();
    }

    function salvarAjustes() {
        dados.config.renda = document.getElementById('set-renda').value;
        dados.config.fixo = document.getElementById('set-fixo').value;
        localStorage.setItem('atelige_data', JSON.stringify(dados));
        alert("Salvo!");
        irPara('home');
    }

    function addInsumo() {
        let n = document.getElementById('ins-nome').value;
        let p = document.getElementById('ins-preco').value;
        if(n && p) {
            dados.materiais.push({nome: n, preco: parseFloat(p)});
            localStorage.setItem('atelige_data', JSON.stringify(dados));
            document.getElementById('ins-nome').value = '';
            document.getElementById('ins-preco').value = '';
            listarInsumos();
        }
    }

    function listarInsumos() {
        let lista = document.getElementById('lista-insumos');
        lista.innerHTML = dados.materiais.map(m => `<div>${m.nome}: R$ ${m.preco.toFixed(2)}</div>`).join('');
    }

    function calcularTudo() {
        let tempo = document.getElementById('prod-tempo').value;
        let custoHora = (dados.config.renda / 160) + (dados.config.fixo / 160); // Base simples
        let custoMinuto = custoHora / 60;
        let total = (tempo * custoMinuto) / 0.5; // Margem simples de 50% para teste
        document.getElementById('resultado').innerText = "R$ " + total.toFixed(2);
    }

    function resetGeral() {
        if(confirm("Limpar tudo para destravar?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
