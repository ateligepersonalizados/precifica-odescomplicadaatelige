<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATELIGÊ v7.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --p: #8e44ad; --s: #9b59b6; --a: #d8bfd8; --l: #f3e5f5; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #f8f4f9; margin: 0; padding: 0; }
        .app { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--s); }
        .screen { display: none; padding: 20px; flex: 1; }
        .active { display: block !important; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: white; border: 2px solid var(--l); padding: 25px 10px; border-radius: 15px; text-align: center; cursor: pointer; border-bottom: 4px solid var(--a); }
        .card i { font-size: 2rem; color: var(--p); margin-bottom: 10px; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .back { color: var(--p); cursor: pointer; font-weight: bold; margin-bottom: 20px; display: block; }
        #pdf-hide { position: absolute; left: -9999px; width: 190mm; background: white; padding: 10mm; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1 style="margin:0">ATELIGÊ</h1>
        <button onclick="resetApp()" style="background:none; border:none; color:white; font-size:0.7rem; text-decoration:underline; cursor:pointer">Resetar Sistema (Limpar Travamentos)</button>
    </header>

    <div id="home" class="screen active">
        <div class="grid">
            <div class="card" onclick="show('set')"><i class="fas fa-cog"></i>Configurar</div>
            <div class="card" onclick="show('mat')"><i class="fas fa-box"></i>Insumos</div>
            <div class="card" onclick="show('list')"><i class="fas fa-list"></i>Salvos</div>
            <div class="card" onclick="show('calc')"><i class="fas fa-calculator"></i>Precificar</div>
        </div>
    </div>

    <div id="set" class="screen">
        <span class="back" onclick="show('home')">← Voltar</span>
        <h3>Configurações</h3>
        <label>Pró-labore (R$)</label><input type="number" id="in-inc" value="2000">
        <label>Custos Fixos (R$)</label><input type="number" id="in-fix" value="1190.67">
        <button class="btn" onclick="saveSet()">SALVAR TUDO</button>
    </div>

    <div id="mat" class="screen">
        <span class="back" onclick="show('home')">← Voltar</span>
        <h3>Novo Insumo</h3>
        <input type="text" id="m-n" placeholder="Nome">
        <input type="number" id="m-v" step="0.0001" placeholder="Preço">
        <button class="btn" onclick="addM()">CADASTRAR</button>
        <div id="m-display" style="margin-top:20px"></div>
    </div>

    <div id="calc" class="screen">
        <span class="back" onclick="show('home')">← Voltar</span>
        <input type="text" id="p-n" placeholder="Nome do Produto">
        <input type="number" id="p-t" placeholder="Tempo (minutos)">
        <select id="p-s" style="width:100%; padding:10px; margin:10px 0"></select>
        <input type="number" id="p-q" placeholder="Quantidade usada">
        <button class="btn" style="background:#9b59b6" onclick="addM2P()">+ Adicionar Insumo</button>
        <div id="p-list" style="font-size:0.8rem; margin:10px 0"></div>
        <button class="btn" style="background:#27ae60" onclick="run()">CALCULAR PREÇO</button>
    </div>

    <div id="res" class="screen">
        <span class="back" onclick="show('home')">← Início</span>
        <div style="text-align:center">
            <h2>Preço Final:</h2>
            <h1 id="res-v" style="font-size:3rem; color:#8e44ad"></h1>
            <button class="btn" onclick="makePDF()">GERAR PDF</button>
        </div>
    </div>
</div>

<div id="pdf-hide">
    <h1 id="pdf-n"></h1>
    <div id="pdf-t"></div>
    <h1 id="pdf-p"></h1>
</div>

<script>
    let d = JSON.parse(localStorage.getItem('atelige_v7')) || { s:{inc:2000, fix:1190.67}, m:[], h:[] };
    let cur = [];

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'mat') renderM();
        if(id === 'calc') loadS();
    }

    function saveSet() {
        d.s.inc = parseFloat(document.getElementById('in-inc').value);
        d.s.fix = parseFloat(document.getElementById('in-fix').value);
        localStorage.setItem('atelige_v7', JSON.stringify(d));
        alert("Salvo!");
        show('home');
    }

    function addM() {
        d.m.push({ n: document.getElementById('m-n').value, v: parseFloat(document.getElementById('m-v').value) });
        localStorage.setItem('atelige_v7', JSON.stringify(d));
        renderM();
    }

    function renderM() {
        document.getElementById('m-display').innerHTML = d.m.map(x => `<div style="padding:10px; border-bottom:1px solid #eee">${x.n}: R$ ${x.v.toFixed(4)}</div>`).join('');
    }

    function loadS() {
        document.getElementById('p-s').innerHTML = d.m.map((x,i) => `<option value="${i}">${x.n}</option>`).join('');
        cur = []; document.getElementById('p-list').innerHTML = '';
    }

    function addM2P() {
        let i = document.getElementById('p-s').value;
        let q = document.getElementById('p-q').value
